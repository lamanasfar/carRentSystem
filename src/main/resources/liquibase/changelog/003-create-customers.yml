databaseChangeLog:
  - changeSet:
      id: create-customers-table
      author: laman
      changes:
        - createTable:
            tableName: customers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_customers
                    nullable: false

              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: father_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: fin_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_customers_fin_code

              - column:
                  name: phone_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_customers_phone_number

              - column:
                  name: identity_serial_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_customers_identity_serial_number

              - column:
                  name: driving_license_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_customers_driving_license_number

              - column:
                  name: driver_license_image
                  type: VARCHAR(500)

              - column:
                  name: identity_card_front_image
                  type: VARCHAR(500)

              - column:
                  name: identity_card_back_image
                  type: VARCHAR(500)

              - column:
                  name: address
                  type: VARCHAR(255)

              - column:
                  name: birth_date
                  type: DATE

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_customers_user_id

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: customers
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_customers_user
            onDelete: CASCADE

        - createIndex:
            tableName: customers
            indexName: idx_customers_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: customers
            indexName: idx_customers_fin_code
            columns:
              - column:
                  name: fin_code

        - createIndex:
            tableName: customers
            indexName: idx_customers_phone_number
            columns:
              - column:
                  name: phone_number