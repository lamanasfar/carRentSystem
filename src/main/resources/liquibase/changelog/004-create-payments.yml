databaseChangeLog:
  - changeSet:
      id: create-payments-table
      author: leman
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_payments
                    nullable: false

              - column:
                  name: rental_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_payments_rental_id

              - column:
                  name: amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: payment_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: receipt_image
                  type: VARCHAR(500)

              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: admin_note
                  type: VARCHAR(1000)

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: rental_id
            referencedTableName: rentals
            referencedColumnNames: id
            constraintName: fk_payments_rental
            onDelete: CASCADE

        - createIndex:
            tableName: payments
            indexName: idx_payments_rental_id
            columns:
              - column:
                  name: rental_id

        - createIndex:
            tableName: payments
            indexName: idx_payments_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: payments
            indexName: idx_payments_payment_date
            columns:
              - column:
                  name: payment_date