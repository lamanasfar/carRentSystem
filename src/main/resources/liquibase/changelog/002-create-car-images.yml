databaseChangeLog:
  - changeSet:
      id: create-car-images-table
      author: laman
      changes:
        - createTable:
            tableName: car_images
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_car_images
                    nullable: false

              - column:
                  name: image_url
                  type: VARCHAR(500)
                  constraints:
                    nullable: false

              - column:
                  name: car_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: car_images
            baseColumnNames: car_id
            referencedTableName: cars
            referencedColumnNames: id
            constraintName: fk_car_images_car
            onDelete: CASCADE

        - createIndex:
            tableName: car_images
            indexName: idx_car_images_car_id
            columns:
              - column:
                  name: car_id